services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  backend:
    build: ./python-proto
    # Port 8000 is internal only now
    expose:
      - "8000"
    volumes:
      - ./python-proto/jobs:/app/jobs
      - ./accessories:/app/accessories
      - ./web/features:/web/features
    restart: always

  frontend:
    build:
      context: ./web
      args:
        # We use the domain name now
        - NEXT_PUBLIC_API_BASE=https://llod.garage.golf
    # Port 3000 is internal only now
    expose:
      - "3000"
    restart: always
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
