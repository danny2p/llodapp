services:
  backend:
    build: ./python-proto
    ports:
      - "8000:8000"
    volumes:
      - ./python-proto/jobs:/app/jobs
      - ./accessories:/app/accessories
    restart: always

  frontend:
    build:
      context: ./web
      args:
        # Replace with your Droplet IP or Domain before running
        - NEXT_PUBLIC_API_BASE=http://your_droplet_ip:8000
    ports:
      - "80:3000"
    restart: always
    depends_on:
      - backend
